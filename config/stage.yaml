app_env: stage

api_base_url: https://billpay-api.gauravkhurana-practice-api.workers.dev
ui_base_url: https://gauravkhurana.com/test-automation-play/
e2e_base_url: https://gauravkhurana.com/practise-api/ui/index.html

api_timeout_s: 30.0
ui_default_timeout_ms: 20000
ui_navigation_timeout_ms: 45000

retry:
  max_attempts: 4
  backoff_factor: 1.0
  retry_on_status: [429, 500, 502, 503, 504]

browser:
  headless: true
  slow_mo_ms: 0
  viewport_width: 1280
  viewport_height: 800
