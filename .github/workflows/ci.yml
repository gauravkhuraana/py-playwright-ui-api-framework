name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      markers:
        description: "Pytest marker expression (e.g. smoke, regression and not flaky)"
        required: false
        default: "smoke"
      app_env:
        description: "Target environment"
        type: choice
        options: [dev, stage, prod]
        default: dev
      update_snapshots:
        description: "Update visual baselines"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write   # for OIDC -> Azure Key Vault

env:
  APP_ENV: ${{ inputs.app_env || 'dev' }}
  MARKERS: ${{ inputs.markers || 'smoke' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.18"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Ruff
        run: uv run ruff check .

      - name: Black
        run: uv run black --check .

      - name: Mypy
        run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: ["1/4", "2/4", "3/4", "4/4"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.18"
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync --all-groups
      - run: uv run playwright install --with-deps ${{ matrix.browser }}

      # OIDC -> Azure (only when secret is configured)
      - name: Azure login (OIDC)
        if: ${{ vars.AZURE_TENANT_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Run tests
        env:
          USE_KEYVAULT: ${{ vars.AZURE_TENANT_ID != '' && 'true' || 'false' }}
          KEYVAULT_NAME: ${{ vars.KEYVAULT_NAME }}
        run: |
          uv run pytest \
            -m "${MARKERS}" \
            --browser=${{ matrix.browser }} \
            --shard=${{ matrix.shard }} \
            ${{ inputs.update_snapshots && '--update-snapshots' || '' }} \
            -n auto

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}-${{ strategy.job-index }}
          path: reports/allure-results
          retention-days: 14

      - name: Upload pytest HTML + traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.browser }}-${{ strategy.job-index }}
          path: |
            reports/pytest-report.html
            reports/videos
            test-results
          retention-days: 14
